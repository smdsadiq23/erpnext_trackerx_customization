
{% extends "templates/web.html" %}

{% block title %}{{ _("Operator Attendance Grid") }}{% endblock %}

{% block head_include %}
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f8f9fa;
    }
    
    .container {
        max-width: 100%;
        margin: 0 auto;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        overflow: hidden;
    }
    
    .header {
        background: #1976d2;
        color: white;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .header h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 500;
    }
    
    .date-selector {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .date-selector input {
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
    }
    
    .btn {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: background-color 0.2s;
    }
    
    .btn-primary {
        background: #2196f3;
        color: white;
    }
    
    .btn-primary:hover {
        background: #1976d2;
    }
    
    .btn-success {
        background: #4caf50;
        color: white;
    }
    
    .btn-success:hover {
        background: #45a049;
    }
    
    .grid-container {
        padding: 20px;
        overflow-x: auto;
    }
    
    .attendance-grid {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }
    
    .attendance-grid th,
    .attendance-grid td {
        border: 1px solid #ddd;
        padding: 8px 12px;
        text-align: center;
    }
    
    .attendance-grid th {
        background: #f5f5f5;
        font-weight: 600;
        position: sticky;
        top: 0;
        z-index: 10;
    }
    
    .attendance-grid th:first-child {
        background: #e3f2fd;
        text-align: left;
        font-weight: 700;
        position: sticky;
        left: 0;
        z-index: 11;
    }
    
    .attendance-grid td:first-child {
        background: #f8f9fa;
        font-weight: 600;
        text-align: left;
        position: sticky;
        left: 0;
        z-index: 9;
    }
    
    .attendance-input {
        width: 60px;
        padding: 4px 8px;
        border: 1px solid #ddd;
        border-radius: 3px;
        text-align: center;
        font-size: 13px;
    }
    
    .attendance-input:focus {
        outline: none;
        border-color: #2196f3;
        box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.2);
    }
    
    .attendance-input.changed {
        background-color: #fff3cd;
        border-color: #ffc107;
    }
    
    .loading {
        text-align: center;
        padding: 40px;
        color: #666;
    }
    
    .error {
        background: #f8d7da;
        color: #721c24;
        padding: 15px;
        margin: 20px;
        border-radius: 4px;
        border: 1px solid #f1b0b7;
    }
    
    .success-message {
        background: #d4edda;
        color: #155724;
        padding: 15px;
        margin: 20px;
        border-radius: 4px;
        border: 1px solid #c3e6cb;
        display: none;
    }
    
    .hour-header {
        writing-mode: vertical-lr;
        text-orientation: mixed;
        min-width: 80px;
        font-size: 12px;
    }
    
    @media (max-width: 768px) {
        .header {
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }
        
        .attendance-grid {
            font-size: 12px;
        }
        
        .attendance-input {
            width: 50px;
        }
    }
</style>
{% endblock %}

{% block page_content %}
<div class="container">
    <div class="header">
        <h1>Operator Attendance</h1>
        <div class="date-selector">
            <label style="color: white; font-weight: 500;">Date:</label>
            <input type="date" id="selectedDate" />
            <button class="btn btn-primary" onclick="loadData()">Load</button>
            <button class="btn btn-success" onclick="saveChanges()">Save Changes</button>
        </div>
    </div>
    
    <div class="success-message" id="successMessage">
        Changes saved successfully!
    </div>
    
    <div class="grid-container">
        <div id="loadingDiv" class="loading">
            Loading attendance data...
        </div>
        <div id="errorDiv" class="error" style="display: none;"></div>
        <div id="gridContainer" style="display: none;">
            <table class="attendance-grid" id="attendanceGrid">
                <!-- Dynamic content will be inserted here -->
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
    let currentData = {};
    let changedCells = new Set();
    let physicalCells = [];

    // Initialize with today's date
    document.getElementById('selectedDate').value = new Date().toISOString().split('T')[0];

    function generateHourColumns(cells, selectedDate) {
        const hours = new Set();
        
        cells.forEach(cell => {
            const startHour = parseInt(cell.start_time.split(':')[0]);
            const endHour = parseInt(cell.end_time.split(':')[0]);
            
            for (let h = startHour; h < endHour; h++) {
                hours.add(h);
            }
        });
        
        return Array.from(hours).sort((a, b) => a - b);
    }

    function formatHour(hour) {
        return `${hour.toString().padStart(2, '0')}:00`;
    }

    function getHourRange(hour) {
        const nextHour = (hour + 1) % 24;
        return `${formatHour(hour)} - ${formatHour(nextHour)}`;
    }

    function createGrid(cells, hours, selectedDate) {
        const grid = document.getElementById('attendanceGrid');
        let html = '<thead><tr><th>Physical Cell</th>';
        
        // Create hour headers
        hours.forEach(hour => {
            html += `<th class="hour-header">${getHourRange(hour)}</th>`;
        });
        html += '</tr></thead><tbody>';
        
        // Create rows for each cell
        cells.forEach(cell => {
            html += `<tr><td>${cell.cell_name}</td>`;
            hours.forEach(hour => {
                const cellStartHour = parseInt(cell.start_time.split(':')[0]);
                const cellEndHour = parseInt(cell.end_time.split(':')[0]);
                
                if (hour >= cellStartHour && hour < cellEndHour) {
                    const key = `${cell.name}-${selectedDate}-${hour}`;
                    const value = currentData[key] || 0;
                    html += `<td><input type="number" class="attendance-input" 
                               data-cell="${cell.name}" data-hour="${hour}" 
                               value="${value}" min="0" 
                               onchange="handleInputChange(this)" /></td>`;
                } else {
                    html += '<td style="background-color: #f0f0f0;">-</td>';
                }
            });
            html += '</tr>';
        });
        
        html += '</tbody>';
        grid.innerHTML = html;
    }

    function handleInputChange(input) {
        const cell = input.dataset.cell;
        const hour = input.dataset.hour;
        const selectedDate = document.getElementById('selectedDate').value;
        const key = `${cell}-${selectedDate}-${hour}`;
        
        currentData[key] = parseInt(input.value) || 0;
        changedCells.add(key);
        input.classList.add('changed');
    }

    async function loadData() {
        const selectedDate = document.getElementById('selectedDate').value;
        if (!selectedDate) {
            frappe.msgprint(__('Please select a date'));
            return;
        }
        
        document.getElementById('loadingDiv').style.display = 'block';
        document.getElementById('gridContainer').style.display = 'none';
        document.getElementById('errorDiv').style.display = 'none';
        
        try {
            const response = await frappe.call({
                method: 'erpnext_trackerx_customization.api.operator_attendance.get_operator_attendance_grid',
                args: { date: selectedDate }
            });
            
            if (response.message.success) {
                physicalCells = response.message.physical_cells;
                currentData = response.message.attendance_data;
                
                const hours = generateHourColumns(physicalCells, selectedDate);
                createGrid(physicalCells, hours, selectedDate);
                
                document.getElementById('loadingDiv').style.display = 'none';
                document.getElementById('gridContainer').style.display = 'block';
                changedCells.clear();
            } else {
                throw new Error(response.message.message);
            }
            
        } catch (error) {
            document.getElementById('loadingDiv').style.display = 'none';
            document.getElementById('errorDiv').style.display = 'block';
            document.getElementById('errorDiv').textContent = 'Error loading data: ' + error.message;
        }
    }

    async function saveChanges() {
        if (changedCells.size === 0) {
            frappe.msgprint(__('No changes to save'));
            return;
        }
        
        const selectedDate = document.getElementById('selectedDate').value;
        const changes = [];
        
        changedCells.forEach(key => {
            const [cell, date, hour] = key.split('-');
            changes.push({
                physical_cell: cell,
                hour: `${date} ${hour.padStart(2, '0')}:00:00`,
                value: currentData[key]
            });
        });
        
        try {
            const response = await frappe.call({
                method: 'erpnext_trackerx_customization.api.operator_attendance.save_operator_attendance_bulk',
                args: { records: changes }
            });
            
            if (response.message.success) {
                // Clear changed indicators
                document.querySelectorAll('.attendance-input.changed').forEach(input => {
                    input.classList.remove('changed');
                });
                
                changedCells.clear();
                
                // Show success message
                const successMsg = document.getElementById('successMessage');
                successMsg.style.display = 'block';
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3000);
                
                frappe.show_alert({
                    message: __('Changes saved successfully!'),
                    indicator: 'green'
                });
            } else {
                throw new Error(response.message.message);
            }
            
        } catch (error) {
            frappe.msgprint({
                title: __('Error'),
                message: __('Error saving changes: ') + error.message,
                indicator: 'red'
            });
        }
    }

    // Load data on page load
    frappe.ready(function() {
        loadData();
    });
</script>
{% endblock %}
